worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Upgrade WebSocket connections transparently
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Upstream definitions (Docker service names) ─────────────────
    upstream web {
        server web:80;
    }
    upstream usermanagementms {
        server usermanagementms:9090;
    }
    upstream humanms {
        server humanms:9091;
    }
    upstream devicems {
        server devicems:9092;
    }

    server {
        listen 80;
        server_name _;

        # ── User-management microservice ──────────────────────────────
        # All requests to /api/um/* are forwarded to usermanagementms,
        # stripping the /api/um prefix.
        location /api/um/ {
            proxy_pass         http://usermanagementms/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Human microservice (HTTP + WebSocket) ─────────────────────
        location /api/hm/ {
            proxy_pass         http://humanms/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket upgrade headers
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 86400s;
        }

        # ── Device microservice (HTTP + WebSocket) ────────────────────
        location /api/dm/ {
            proxy_pass         http://devicems/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket upgrade headers
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 86400s;
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────
        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
