services:

  # ─────────────────────────────────────────────
  # Reverse proxy – single entry point (port 80)
  # ─────────────────────────────────────────────
  nginx:
    container_name: multhingverse-gateway
    image: nginx:1.27-alpine
    #ports:
      #- "${HTTP_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - usermanagementms
      - humanms
      - devicems
    networks:
      - multhingverse
      - liciot_network   # shared with the cloud gate nginx so it can resolve 'nginx:80'
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Frontend (React SPA – served as static files)
  # ─────────────────────────────────────────────
  web:
    container_name: multhingverse-ui
    build:
      context: ./web
      dockerfile: Dockerfile
    networks:
      - multhingverse
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Backend microservices
  # ─────────────────────────────────────────────
  usermanagementms:
    container_name: multhingverse-usermgmt
    build:
      context: ./backendms/usermanagementms
      dockerfile: Dockerfile
    environment:
      # Database
      LICIOT_DATABASE_HOST: postgres
      LICIOT_DATABASE_PORT: "5432"
      LICIOT_DATABASE_NAME: "${POSTGRES_DB:-multhingverse_db}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-multhingverse}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      # Kafka
      LICIOT_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      # App
      PORT: "9090"
      JWT_SECRET: "${JWT_SECRET:-changeme_jwt_secret_replace_in_prod}"
      FILE_UPLOAD_DIR: "/app/uploads/"
    volumes:
      - uploads_um:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - multhingverse
    restart: unless-stopped

  humanms:
    container_name: multhingverse-portalms
    build:
      context: ./backendms/humanms
      dockerfile: Dockerfile
    environment:
      # Database (humanms shares the same DB)
      DB_IP: postgres
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-multhingverse}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      DB_DBNAME: "${POSTGRES_DB:-multhingverse_db}"
      # Kafka
      LICIOT_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      # Inter-service
      LICIOT_USERMANAGEMENTMICROSERVICE_HOST: "http://usermanagementms:9090"
      # App
      PORT: "9091"
      JWT_SECRET: "${JWT_SECRET:-changeme_jwt_secret_replace_in_prod}"
      FILE_UPLOAD_DIR: "/app/uploads/"
    volumes:
      - uploads_hm:/app/uploads
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - multhingverse
    restart: unless-stopped

  devicems:
    container_name: multhingverse-devicems
    build:
      context: ./backendms/devicems
      dockerfile: Dockerfile
    environment:
      # Database
      DB_IP: postgres
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-multhingverse}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      DB_DBNAME: "${POSTGRES_DB:-multhingverse_db}"
      # Kafka
      LICIOT_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      # Inter-service
      LICIOT_USERMANAGEMENTMICROSERVICE_HOST: "http://usermanagementms:9090"
      # App
      PORT: "9092"
      JWT_SECRET: "${JWT_SECRET:-changeme_jwt_secret_replace_in_prod}"
      FILE_UPLOAD_DIR: "/app/uploads/"
    volumes:
      - uploads_dm:/app/uploads
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - multhingverse
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    container_name: multhingverse-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-multhingverse}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      POSTGRES_DB: "${POSTGRES_DB:-multhingverse_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - multhingverse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multhingverse} -d ${POSTGRES_DB:-multhingverse_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Kafka – Confluent Platform (KRaft, no Zookeeper)
  # cp-kafka 7.6.x = Kafka 3.6.x, production-proven image
  # ─────────────────────────────────────────────
  kafka:
    container_name: multhingverse-broker
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # ── Retention: whichever limit is hit first triggers cleanup ─────
      KAFKA_LOG_RETENTION_HOURS: "168"          # 7 days max age
      KAFKA_LOG_RETENTION_BYTES: "536870912"    # 512 MB max per partition
      KAFKA_LOG_SEGMENT_BYTES: "104857600"      # 100 MB segments (smaller = faster cleanup)
      KAFKA_LOG_SEGMENT_MS: "86400000"          # roll segment daily so time-based cleanup works on quiet topics
      KAFKA_LOG_CLEANUP_POLICY: "delete"
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "300000"  # check every 5 min
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Fixed cluster ID required for KRaft (base64-encoded 128-bit UUID, 22 chars)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - multhingverse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  multhingverse:
    driver: bridge
  liciot_network:
    external: true   # must match the network name the cloud gate nginx is already on

volumes:
  postgres_data:
  kafka_data:
  uploads_um:
  uploads_hm:
  uploads_dm:
