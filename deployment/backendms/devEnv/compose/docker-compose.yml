version: "3.9"
services:
  pgsqlc:
    image: postgres:14-alpine
    container_name: pgsql_devc
    networks:
      liciot_network:
         ipv4_address: "192.168.5.100"
     

    environment:
    - POSTGRES_PASSWORD=DB_PASSWORD
    - POSTGRES_USER=DB_USER
    - POSTGRES_DB=DB_DB

    volumes:
    - ${BACKENDMS_PATH}/backendms/devenv/docker/volumes/pgsql_dev:/var/lib/postgresql/data

  pgadminc:
    image: dpage/pgadmin4
    container_name: pgadmin_devc
    networks:
      liciot_network:
         ipv4_address: "192.168.5.101"
    ports:
     - 90:80
    environment:
      - PGADMIN_DEFAULT_PASSWORD=123456789
      - PGADMIN_DEFAULT_EMAIL=joldesstefan@yahoo.com




networks:
  liciot_network:
    name: liciot_network
    external: true