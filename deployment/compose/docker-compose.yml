version: '3.9'
services:
  zookeeper_1c:
    container_name: zookeeper_1c
    image: myzookeeper
    networks:
      liciot_network:
         ipv4_address: "192.168.5.12"
    restart: "always"
    volumes:
      - ${KAFKACL_PATH}/kafka/myimagesdestination/zookeeper/volumes/zookeeper_1/config/zookeeper.properties:/kafka/config/zookeeper.properties
      - ${KAFKACL_PATH}/kafka/myimagesdestination/zookeeper/volumes/zookeeper_1/config/myid:/tmp/zookeeper/zookeeper-logs/myid
      - ${KAFKACL_PATH}/kafka/permanentvolumes/zookeeper/zookeeper_1/zookeeper-logs:/tmp/zookeeper/zookeeper-logs
    build:
      context: ../kafka/myimagesdestination/zookeeper/build


     
  kafka_1c:
    container_name: kafka_1c
    image: mykafka
    networks:
      liciot_network:
         ipv4_address: "192.168.5.19"
    restart: "always"
    volumes:
      - ${KAFKACL_PATH}/kafka/myimagesdestination/kafka/volumes/kafka_1/config/server.properties:/kafka/config/server.properties
      - ${KAFKACL_PATH}/kafka/permanentvolumes/kafka/kafka_1/kafka-logs:/tmp/kafka-logs
    build:
      context: ../kafka/myimagesdestination/kafka/build

  usermanagementmsc:
    container_name: usermanagementmsc
    image: myusermanagementms
    environment:
      - LICIOT_DATABASE_HOST=192.168.5.100
      - LICIOT_KAFKA_BOOTSTRAP_SERVERS=192.168.5.19:19092
    build:
      context: ../backendms/um/build
    networks:
      liciot_network:
         ipv4_address: "192.168.5.150"
    restart: "always"
    ports:
      - 9090:9090

  humanmicroservicec:
    container_name: humanmicroservicec
    image: myhumanmicroservice
    environment:
      - LICIOT_KAFKA_BOOTSTRAP_SERVERS=192.168.5.19:19092
      - LICIOT_USERMANAGEMENTMICROSERVICE_HOST=http://192.168.5.150:9090
    build:
      context: ../backendms/hm/build
    networks:
      liciot_network:
         ipv4_address: "192.168.5.151"
    restart: "always"
    ports:
      - 9091:9091
    
  devicemicroservicec:
    container_name: devicemicroservicec
    image: mydevicemicroservice
    environment:
      - LICIOT_KAFKA_BOOTSTRAP_SERVERS=192.168.5.19:19092
      - LICIOT_USERMANAGEMENTMICROSERVICE_HOST=http://192.168.5.150:9090
    build:
      context: ../backendms/dm/build
    networks:
      liciot_network:
         ipv4_address: "192.168.5.152"
    restart: "always"
    ports:
      - 9092:9092

  frontendc:
    container_name: frontendc
    image: myfrontend
    networks:
      liciot_network:
         ipv4_address: "192.168.5.200"
    restart: "always"
    ports:
       - 81:80
    build:
      context: ../frontend/build
 

  pgsqlc:
    image: postgres:14-alpine
    container_name: pgsql_devc
    networks:
      liciot_network:
         ipv4_address: "192.168.5.100"
    restart: "always"
    environment:
    - POSTGRES_PASSWORD=DB_PASSWORD
    - POSTGRES_USER=DB_USER
    - POSTGRES_DB=DB_DB

    volumes:
    - ${BACKENDMS_PATH}/backendms/devenv/docker/volumes/pgsql_dev:/var/lib/postgresql/data


  
networks:
  liciot_network:
    name: liciot_network
    external: true
